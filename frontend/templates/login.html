{% extends "base.html" %}

{% block title %}로그인 - ST영원 스마트 오피스{% endblock %}
{% block header %}{% endblock %}

{% block content %}
<div class="files-container">
    <div class="admin-section" style="max-width: 400px; margin: 80px auto;">
        <h2 style="text-align: center; color: var(--primary); border-bottom: none; padding-bottom: 0;">ST영원 스마트 오피스</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 24px;">로그인이 필요합니다.</p>
        <div id="loginError" class="alert alert-error" style="display: none;"></div>
        <div class="form-group">
            <label class="form-label">아이디</label>
            <input type="text" id="loginUsername" class="form-input" placeholder="아이디"
                   onkeydown="if(event.key==='Enter') document.getElementById('loginPassword').focus()">
        </div>
        <div class="form-group">
            <label class="form-label">비밀번호</label>
            <input type="password" id="loginPassword" class="form-input" placeholder="비밀번호"
                   onkeydown="if(event.key==='Enter') doLogin()">
        </div>
        <button class="btn btn-primary" style="width: 100%; margin-top: 8px;" onclick="doLogin()">로그인</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// 이미 로그인 상태면 리다이렉트
(async () => {
    try {
        const resp = await fetch('/api/auth/me');
        if (resp.ok) {
            const user = await resp.json();
            window.location.href = user.role === 'admin' ? '/admin' : '/';
        }
    } catch (e) { /* not logged in */ }
})();

async function doLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!username || !password) return;

    const errEl = document.getElementById('loginError');
    errEl.style.display = 'none';

    try {
        const formData = new FormData();
        formData.append('username', username);
        formData.append('password', password);

        const resp = await fetch('/api/auth/login', { method: 'POST', body: formData });
        const data = await resp.json();

        if (data.success) {
            window.location.href = data.user.role === 'admin' ? '/admin' : '/';
        } else {
            errEl.textContent = data.message;
            errEl.style.display = 'block';
        }
    } catch (e) {
        errEl.textContent = '로그인 중 오류가 발생했습니다.';
        errEl.style.display = 'block';
    }
}
</script>
{% endblock %}
