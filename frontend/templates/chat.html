{% extends "base.html" %}

{% block nav_chat_active %}active{% endblock %}

{% block content %}
<div class="chat-container">
    <div class="chat-messages" id="chatMessages">
        <div class="welcome-message" id="welcomeMessage">
            <h2>ST영원 스마트 오피스</h2>
            <p>사내 규정 조회, 파일 관리, AI 챗봇 서비스입니다.</p>
            <div class="suggestion-chips">
                <button class="suggestion-chip" onclick="sendSuggestion(this)">연차 사용 규정이 어떻게 되나요?</button>
                <button class="suggestion-chip" onclick="sendSuggestion(this)">출퇴근 시간은 어떻게 되나요?</button>
                <button class="suggestion-chip" onclick="sendSuggestion(this)">경조사 휴가 규정을 알려주세요</button>
                <button class="suggestion-chip" onclick="sendSuggestion(this)">취업규칙 파일은 어디에 있나요?</button>
            </div>
        </div>
    </div>

    <div class="chat-input-container">
        <div class="chat-input-wrapper">
            <textarea
                class="chat-input"
                id="chatInput"
                placeholder="질문을 입력하세요..."
                rows="1"
                onkeydown="handleKeyDown(event)"
                oninput="autoResize(this)"
            ></textarea>
            <button class="chat-send-btn" id="sendBtn" onclick="sendMessage()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="/static/js/chat.js"></script>
{% endblock %}
