<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ST영원 스마트 오피스{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    {% block header %}
    <header class="app-header">
        <div class="header-content">
            <h1 class="header-title">ST영원 스마트 오피스</h1>
            <nav class="header-nav">
                <a href="/" class="nav-link {% block nav_chat_active %}{% endblock %}">채팅</a>
                <a href="/files" class="nav-link {% block nav_files_active %}{% endblock %}">파일</a>
                <a href="/admin" class="nav-link admin-only {% block nav_admin_active %}{% endblock %}">관리</a>
                <span class="nav-user-info" id="navUserInfo" style="display:none;">
                    <span id="navUsername"></span>
                    <a href="#" class="nav-link" onclick="doLogout(); return false;">로그아웃</a>
                </span>
            </nav>
        </div>
    </header>
    {% endblock %}
    <main class="app-main">
        {% block content %}{% endblock %}
    </main>
    <script src="/static/js/auth.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
