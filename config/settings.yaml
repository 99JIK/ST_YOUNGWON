# ST영원 스마트 오피스 설정

app:
  name: "ST영원 스마트 오피스"
  version: "1.0.0"

llm:
  default_provider: "openai"
  openai:
    model: "gpt-4o-mini"
    temperature: 0.3
    max_tokens: 1024
  claude:
    model: "claude-3-5-haiku-20241022"
    temperature: 0.3
    max_tokens: 1024
  ollama:
    model: "gemma3:4b"
    temperature: 0.3
    max_tokens: 1024

embedding:
  provider: "openai"
  model: "text-embedding-3-small"

rag:
  chunk_size: 800
  chunk_overlap: 100
  top_k: 5
  similarity_threshold: 0.3

nas:
  server_name: "NAS_SERVER"
